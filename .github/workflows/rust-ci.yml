name: Rust CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Windows is excluded until proper system-dep handling lands
        # (currently the workflow has a stub for it that always fails).
        # Re-add via vcpkg or pre-built `libnetcdf` / `libhdf5` binaries.
        os: [ubuntu-latest, macos-latest]
        rust: [stable, beta]
        exclude:
          # Reduce CI time - only test beta on Ubuntu.
          - os: macos-latest
            rust: beta

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}

    - name: Set up Python 3.13
      # PyO3 0.22 (used by `radish-python`) caps at Python 3.13.
      # macos-latest currently ships 3.14 by default, which fails with
      # "the configured Python interpreter version (3.14) is newer than
      # PyO3's maximum supported version (3.13)". Pin a compatible
      # interpreter for the workspace build.
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Cache cargo registry
      uses: actions/cache@v5
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v5
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v5
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libnetcdf-dev libhdf5-dev

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install netcdf hdf5

    - name: Check formatting
      if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
      run: cargo fmt --all -- --check

    - name: Run clippy
      if: matrix.rust == 'stable'
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Build
      run: cargo build --verbose --all-features

    - name: Run tests
      run: cargo test --verbose --all-features

    - name: Build examples
      run: cargo build --examples --verbose

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Set up Python 3.13
      # See `Set up Python 3.13` comment in the `test` job above.
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libnetcdf-dev libhdf5-dev

    - name: Install tarpaulin
      run: cargo install cargo-tarpaulin

    - name: Run tests with coverage
      # `radish-python` is a `cdylib` built with PyO3's `extension-module`
      # feature, which deliberately leaves Python C-API symbols unresolved
      # at link time (Python supplies them at runtime when the .so is
      # imported). Tarpaulin builds a regular test binary and links with
      # the system linker, so every `pyo3_ffi` symbol resolves to
      # `undefined symbol: PyBool_Type` etc. The Python bindings are
      # exercised by `python-ci.yml`'s pytest suite — exclude the crate
      # from Rust coverage instead of trying to special-case its link.
      run: cargo tarpaulin --verbose --all-features --workspace --exclude radish-python --timeout 120 --out xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./cobertura.xml
        fail_ci_if_error: false

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    # Inline `cargo audit` instead of `rustsec/audit-check@v2` — that
    # action has no Node 24-compatible release as of May 2026 and was
    # the last source of Node.js 20 deprecation warnings on Rust CI.
    # Direct invocation also makes the ignore-list visible in plain
    # shell rather than buried in an action input.
    #
    # RUSTSEC-2025-0020 is a `pyo3::types::PyString::from_object`
    # buffer-overflow advisory (patched in pyo3 0.24.1). We pin pyo3
    # 0.22 because the upstream `nexrad` crate ecosystem hasn't moved
    # yet, and our bindings in `python/src/lib.rs` don't construct
    # `PyString` from raw `&str` — we round-trip through PyO3's safe
    # `String`/`&str` conversions which already null-terminate.
    # Reassess when we can bump pyo3.
    - name: Install cargo-audit
      run: cargo install --locked cargo-audit

    - name: Run security audit
      run: cargo audit --ignore RUSTSEC-2025-0020
