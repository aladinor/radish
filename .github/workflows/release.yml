name: Release

# Triggered when a `v*.*.*` tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
# Builds platform/arch/python-version-matrixed wheels via PyO3/maturin-action,
# uploads them as artifacts, then publishes to PyPI via the official PyPA
# action. The crates.io publish step is deferred — the `radish` slot on
# crates.io is taken; re-add a `publish-crate` job once we rename the Rust
# crate or coordinate with the upstream owner.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # --- 1. GitHub Release ---------------------------------------------------
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

  # --- 2. Build wheels for every (os, arch, python) combo -----------------
  build-wheels:
    name: ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (manylinux 2_17 / glibc 2.17+; covers RHEL 7, Ubuntu 18+, …)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: '2_17'
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: '2_17'
          # macOS (Intel + Apple Silicon)
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          # Windows (x86_64 only — aarch64 Windows wheels are still uncommon)
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # System deps for libnetcdf / libhdf5 (CfRadial1 backend). The Linux
      # builds happen inside the maturin-action manylinux container, so we
      # install via the container's package manager via the `before-script`
      # hook (see below).
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install netcdf hdf5
          # Tell rustc / pkg-config where Homebrew put the headers + libs
          echo "HDF5_DIR=$(brew --prefix hdf5)" >> $GITHUB_ENV
          echo "NETCDF_DIR=$(brew --prefix netcdf)" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix hdf5)/lib/pkgconfig:$(brew --prefix netcdf)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: |
          # vcpkg ships pre-built static libs for hdf5 + netcdf.
          # `vcpkg install` is slow (~5 min) but cached after the first run.
          vcpkg install hdf5:x64-windows-static-md netcdf-c:x64-windows-static-md
          echo "HDF5_DIR=$Env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-static-md" >> $Env:GITHUB_ENV
          echo "NETCDF_DIR=$Env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-static-md" >> $Env:GITHUB_ENV
        shell: pwsh

      - name: Build wheel(s) — Linux (manylinux container)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: >-
            --release --strip --out dist
            --interpreter python3.9 python3.10 python3.11 python3.12
          # Install libnetcdf-dev / libhdf5-dev inside the manylinux container
          # so cargo can link against them. The container is centos7-based
          # (manylinux_2_17), so we use yum.
          before-script-linux: |
            if command -v yum >/dev/null 2>&1; then
              yum install -y hdf5-devel netcdf-devel
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update && apt-get install -y libhdf5-dev libnetcdf-dev
            fi

      - name: Build wheel(s) — macOS / Windows (host)
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          args: >-
            --release --strip --out dist
            --interpreter python3.9 python3.10 python3.11 python3.12

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: python/dist/*.whl

  # --- 3. Source distribution ---------------------------------------------
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  # --- 4. Publish everything to PyPI in one upload ------------------------
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/')
    # Trusted publishing requires `id-token: write` and an environment.
    # The `pypi` environment must be configured at PyPI (Manage account →
    # Publishing → Add a pending publisher) before the first run.
    environment:
      name: pypi
      url: https://pypi.org/p/radish-rs
    permissions:
      id-token: write
    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        # `pypa/gh-action-pypi-publish` is the official PyPA action; it
        # automatically uses OIDC trusted publishing when `id-token: write`
        # is set and an environment is configured. Fall back to
        # `password: ${{ secrets.PYPI_TOKEN }}` if you prefer API tokens.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
