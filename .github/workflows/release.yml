name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        # `actions/create-release@v1` is archived/deprecated; use the
        # maintained replacement.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-python-wheels:
    name: Build Python wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        # Windows is excluded until proper system-dep handling lands
        # (currently the workflow has a stub for it that always fails).
        # Re-add via vcpkg or pre-built `libnetcdf` / `libhdf5` binaries.
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libnetcdf-dev libhdf5-dev

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install netcdf hdf5

    - name: Install maturin
      run: pip install maturin

    - name: Build wheels
      run: |
        cd python
        maturin build --release --strip

    - name: Upload wheel
      # Wheels go to the workspace `target/wheels/` directory,
      # not `python/target/wheels/`. Disambiguate from the unrelated
      # `radish` package on PyPI by using the wheel directly during install.
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: target/wheels/*.whl

  publish-python:
    name: Publish Python Package to PyPI
    runs-on: ubuntu-latest
    needs: build-python-wheels
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Download all wheels
      uses: actions/download-artifact@v4
      with:
        path: wheels

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install twine
      run: pip install twine

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        twine upload wheels/**/*.whl

  publish-crate:
    name: Publish Rust Crate to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libnetcdf-dev libhdf5-dev

    - name: Publish to crates.io
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: |
        cargo publish --package radish-types
        sleep 10  # Wait for crates.io to index
        cargo publish --package radish
