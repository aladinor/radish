name: Benchmarks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libnetcdf-dev libhdf5-dev

    - name: Run benchmarks
      # The criterion bench at radish/benches/nexrad.rs gates on
      # RADISH_NEXRAD_FIXTURE — it prints a skip message and exits cleanly
      # if the env var is unset, so this is safe even without a fixture
      # checked into the repo.
      run: cargo bench -p radish --bench nexrad

    - name: Upload bench output
      uses: actions/upload-artifact@v4
      with:
        name: criterion-report
        path: target/criterion/
        if-no-files-found: ignore
